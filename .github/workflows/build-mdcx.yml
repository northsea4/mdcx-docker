name: Image build-mdcx CI

run-name: Image build-mdcx CI [stage=${{ github.event.inputs.stage || 'prod' }}]

on:
  push:
    branches:
      - none

  # workflow_run:
  #   workflows: [Watch MDCx Release]
  #   types: [completed]
  #   branches: [main]

  workflow_dispatch:
    inputs:
      stage:
        description: Stage
        type: choice
        default: prod
        options:
          - dev
          - prod
      baseImage:
        description: Tag of base image `build-mdcx-base`
        default: 'v2-latest-pyqt6'

env:
  IMAGE_BASE: build-mdcx
  IMAGE_KEY: build-mdcx
  PYPI_MIRROR: https://pypi.org/simple
  APT_SOURCE_HOST: ''
  ENABLE_TG_NOTIFICATION: ${{ vars.ENABLE_TG_NOTIFICATION }}
  MDCX_TAG: ${{ vars.MDCX_TAG }}
  MDCX_SRC_TAG: ${{ vars.MDCX_SRC_TAG }}
  MDCX_SRC_REPO: ${{ vars.MDCX_SRC_REPO }}

jobs:
  build:
    runs-on: ubuntu-latest
    # 如果是workflow_run(即Watch MDCx Release)触发的，只有当上游workflow成功时才运行
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - 
        name: Checkout
        uses: actions/checkout@v3
      -
        name: Install apt packages
        run: sudo apt-get install -y unrar
      -
        name: Prepare App source
        id: prepare
        run: |
          SRC_REPO=${{ env.MDCX_SRC_REPO }}
          SRC_TAG=${{ env.MDCX_SRC_TAG }}

          # 回退读取仓库根目录 .env
          if [[ -z "$SRC_REPO" && -f .env ]]; then
            SRC_REPO=$(grep -E '^MDCX_SRC_REPO=' .env | tail -n1 | cut -d '=' -f2-)
          fi
          if [[ -z "$SRC_TAG" && -f .env ]]; then
            SRC_TAG=$(grep -E '^MDCX_SRC_TAG=' .env | tail -n1 | cut -d '=' -f2-)
          fi

          if [[ -z "$SRC_TAG" ]]; then
            SRC_TAG=${{ env.MDCX_TAG }}
          fi

          if [[ -z "$SRC_REPO" ]]; then
            SRC_REPO='sqzw-x/mdcx'
          fi

          if [[ -n "$SRC_TAG" ]]; then
            bash ./prepare-src.sh --verbose --context $IMAGE_BASE --repo "$SRC_REPO" --tag "$SRC_TAG" --token "${{ secrets.GITHUB_TOKEN }}"
          else
            bash ./prepare-src.sh --verbose --context $IMAGE_BASE --repo "$SRC_REPO" --token "${{ secrets.GITHUB_TOKEN }}"
          fi
      -
        name: Prepare Version Values
        uses: cardinalby/export-env-action@v2
        id: versions
        with:
          envFile: '.env.versions'
          export: 'false'
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - 
        name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - 
        name: Produce docker image tags and other information
        id: imageInfo
        run: |
          STAGE=${{ github.event.inputs.stage }}
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            WORKFLOW_RUN_JSON='${{ toJson(github.event.workflow_run) }}'
            if echo "$WORKFLOW_RUN_JSON" | grep -q 'stage=dev'; then
              STAGE=dev
            else
              STAGE=prod
            fi
          fi

          if [[ "$STAGE" == "dev" ]]; then
            echo "latest=v2-latest-dev-pyqt6" >> $GITHUB_OUTPUT
            echo "version=${{ steps.prepare.outputs.APP_VERSION }}-dev-pyqt6" >> $GITHUB_OUTPUT
          else
            echo "latest=v2-latest-pyqt6" >> $GITHUB_OUTPUT
            echo "version=${{ steps.prepare.outputs.APP_VERSION }}-pyqt6" >> $GITHUB_OUTPUT
          fi

          baseImageTag=${{ github.event.inputs.baseImage }}
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            if [[ "$STAGE" == "dev" ]]; then
              baseImageTag=v2-latest-dev-pyqt6
            else
              baseImageTag=v2-latest-pyqt6
            fi
          fi
          baseImageTag=${baseImageTag:-v2-latest-pyqt6}

          echo "stage=${STAGE}" >> $GITHUB_OUTPUT
          echo "baseImageTag=${baseImageTag}" >> $GITHUB_OUTPUT
      - 
        name: Build and push
        id: buildAndPush
        uses: docker/build-push-action@v3
        with:
          context: .
          # cache-from: type=gha
          # cache-to: type=gha,mode=min
          file: ${{ env.IMAGE_BASE }}/Dockerfile.${{ env.IMAGE_KEY }}
          build-args: |
            APT_SOURCE_HOST=${{ env.APT_SOURCE_HOST }}
            PYPI_MIRROR=${{ env.PYPI_MIRROR }}
            BASE_IMAGE_TAG=${{ steps.imageInfo.outputs.baseImageTag }}
            APP_VERSION=${{ steps.prepare.outputs.APP_VERSION }}
          platforms: |
            linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_KEY }}:${{ steps.imageInfo.outputs.latest }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_KEY }}:${{ steps.imageInfo.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_KEY }}:v2-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_KEY }}:v2-${{ steps.prepare.outputs.APP_VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_KEY }}:${{ steps.prepare.outputs.APP_VERSION }}

      -
        name: TG Notification
        uses: appleboy/telegram-action@master
        if: ${{ env.ENABLE_TG_NOTIFICATION == 'true' }}
        with:
          to: ${{ secrets.TELE_CHAT_ID }}
          token: ${{ secrets.TELE_BOT_TOKEN }}
          message: |
            🎉 Workflow: ${{ github.workflow }} is completed!

            🔘 Stage: ${{ github.event.inputs.stage }}

            📦 Dockerfile: ${{ env.IMAGE_BASE }}/Dockerfile.${{ env.IMAGE_KEY }}
            📦 Build Args:
                  APT_SOURCE_HOST=${{ env.APT_SOURCE_HOST }}
                  PYPI_MIRROR=${{ env.PYPI_MIRROR }}
                  BASE_IMAGE_TAG=${{ steps.imageInfo.outputs.baseImageTag }}
                  APP_VERSION=${{ steps.prepare.outputs.APP_VERSION }}

            📦 Image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_KEY }}
            📦 Tags: ${{ steps.imageInfo.outputs.latest }}, ${{ steps.imageInfo.outputs.version }}
           
            📦 ImageId: ${{ steps.buildAndPush.outputs.imageid }}
            📦 Digest: ${{ steps.buildAndPush.outputs.digest }}