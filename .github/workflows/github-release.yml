name: Github Release CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

  workflow_dispatch:
    inputs:
      tag:
        description: Tag
        default: 'latest'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.ref_name == 'main' || github.ref_type == 'tag' }}
    steps:
      - 
        name: Checkout
        uses: actions/checkout@v3
      -
        name: Prepare Version Values
        uses: cardinalby/export-env-action@v2
        id: versions
        with:
          envFile: '.env.versions'
          export: 'false'
      - 
        name: Create template directories
        id: prepare
        run: |
          mkdir mdcx-docker && cd mdcx-docker && cp -a ../gui-base/. .
          cp .env.sample .env
          cp mdcx-builtin.sample.yml docker-compose.yml
          rm Dockerfile*
          rm -rf rootfs*
          cd ..
          zip -q -r template-mdcx-builtin-gui-base.zip mdcx-docker

          rm -rf mdcx-docker

          mkdir mdcx-docker && cd mdcx-docker && cp -a ../webtop-base/. .
          cp .env.sample .env
          cp mdcx-builtin.sample.yml docker-compose.yml
          rm Dockerfile*
          rm -rf rootfs*
          cd ..
          zip -q -r template-mdcx-builtin-webtop-base.zip mdcx-docker

          rm -rf mdcx-docker

          TAG=latest
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG=${{ github.ref_name }}
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.tag }}" ]]; then
            TAG=${{ github.event.inputs.tag }}
          fi

          echo "TAG=$TAG" >> $GITHUB_OUTPUT
      - 
        name: Create release
        uses: ncipollo/release-action@v1
        with:
          name: "${{ steps.prepare.outputs.TAG }}"
          tag: "${{ steps.prepare.outputs.TAG }}"
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          artifacts: "template-*.zip"

        